version: "3.8"

services:
  neo4j:
    image: neo4j:5.13
    container_name: tip-neo4j
    ports:
      - "7474:7474"
      - "7687:7687"
    environment:
      - NEO4J_AUTH=neo4j/changeme
      - NEO4J_PLUGINS=["apoc"]
    volumes:
      - ../data/neo4j_data:/data

  qdrant:
    image: qdrant/qdrant:v1.7.4
    container_name: tip-qdrant
    ports:
      - "6333:6333"
    volumes:
      - ../qdrant_storage:/qdrant/storage
